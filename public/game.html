<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ゲーム - 太鼓リズムゲーム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/game.css">
</head>
<body class="game-body">
  <div class="game-hud">
    <div class="hud-left">
      <span class="hud-label">SCORE</span>
      <span class="hud-value" id="scoreDisplay">0</span>
    </div>
    <div class="hud-center">
      <span class="song-name-hud" id="songNameHud"></span>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>
    <div class="hud-right">
      <span class="hud-label">COMBO</span>
      <span class="hud-value combo-value" id="comboDisplay">0</span>
    </div>
    <button class="btn-menu-hud" id="btnMenuHud" title="メニュー (ESC)">⏸ MENU</button>
  </div>

  <!-- 対戦相手HUD (オンライン時のみ表示) -->
  <div class="opponent-hud" id="opponentHud" style="display:none">
    <div class="opponent-info">
      <span class="opponent-label">⚔️ VS <span id="opponentNameHud"></span></span>
    </div>
    <div class="opponent-stats">
      <div class="opponent-stat">
        <span class="opponent-stat-label">SCORE</span>
        <span class="opponent-stat-value" id="opponentScore">0</span>
      </div>
      <div class="opponent-stat">
        <span class="opponent-stat-label">COMBO</span>
        <span class="opponent-stat-value" id="opponentCombo">0</span>
      </div>
      <div class="opponent-judgment" id="opponentJudgment"></div>
    </div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div class="key-hints">
    <div class="key-hint">
      <kbd>D</kbd><kbd>F</kbd><kbd>Space</kbd>
      <span class="don-label">ドン 🔴</span>
    </div>
    <div class="key-hint">
      <span class="ka-label">カッ 🔵</span>
      <kbd>J</kbd><kbd>K</kbd><kbd>Enter</kbd>
    </div>
  </div>

  <!-- カウントダウン (初期テキストなし) -->
  <div class="countdown-overlay" id="countdownOverlay">
    <div class="countdown-number" id="countdownNumber"></div>
  </div>

  <!-- ポーズオーバーレイ -->
  <div class="pause-overlay" id="pauseOverlay" style="display:none">
    <div class="pause-panel">
      <h2 class="pause-title">⏸ ポーズ</h2>
      <button class="pause-btn resume-btn" id="btnResume">▶ 続ける</button>
      <button class="pause-btn menu-btn"   id="btnToMenu">🏠 メニューへ</button>
    </div>
  </div>

  <!-- 対戦結果オーバーレイ -->
  <div class="battle-result-overlay" id="battleResultOverlay" style="display:none">
    <div class="battle-result-panel">
      <h2 class="battle-result-title" id="battleResultTitle"></h2>
      <div class="battle-scores" id="battleScores"></div>
      <button class="pause-btn resume-btn" id="btnBattleMenu">🏠 メニューへ</button>
    </div>
  </div>

  <!-- 相手切断オーバーレイ -->
  <div class="pause-overlay" id="disconnectOverlay" style="display:none">
    <div class="pause-panel">
      <h2 class="pause-title">😢 相手が切断しました</h2>
      <p style="color:#aaa;margin-bottom:1rem">ソロプレイとして続行できます</p>
      <button class="pause-btn resume-btn" id="btnContinueSolo">▶ 続ける</button>
      <button class="pause-btn menu-btn" id="btnDisconnectMenu">🏠 メニューへ</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/chart.js"></script>
  <script src="js/multiplayer.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
