<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>太鼓リズムゲーム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-stars" id="bgStars"></div>

  <div class="container">
    <header class="title-header">
      <h1 class="game-title">🥁 太鼓リズムゲーム</h1>
      <p class="game-subtitle">ドンドンカッカッ！</p>
    </header>

    <section class="song-list" id="songList">
      <!-- JS で生成 -->
    </section>

    <div class="difficulty-panel" id="difficultyPanel" style="display:none">
      <h2 class="panel-title" id="selectedSongTitle"></h2>
      <p class="panel-artist" id="selectedSongArtist"></p>
      <div class="difficulty-buttons">
        <button class="diff-btn easy"   data-diff="easy">かんたん</button>
        <button class="diff-btn normal" data-diff="normal">ふつう</button>
        <button class="diff-btn hard"   data-diff="hard">むずかしい</button>
      </div>
      <div class="panel-actions">
        <button class="btn-ranking" id="btnRanking">🏆 ランキング</button>
        <button class="btn-back"    id="btnBack">← 戻る</button>
      </div>
    </div>
  </div>

  <script src="js/chart.js"></script>
  <script src="js/songSelect.js"></script>
</body>
</html>
